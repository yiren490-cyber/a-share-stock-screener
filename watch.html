<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>A股实时盯盘</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="assets/styles.css?v=20260724-stop-risk-effects" />
  </head>
  <body class="watch-page">
    <main class="watch-shell">
      <section class="watch-topbar">
        <div class="watch-brand">
          <h1>A股实时盯盘</h1>
          <p id="watchStatus">输入股票代码，或从已有分组中选择股票。</p>
        </div>
        <div class="watch-controls">
          <label class="watch-symbol-field">
            <span>股票代码</span>
            <input id="watchSymbolInput" type="search" placeholder="600519 / sh600519" />
            <div id="watchSearchHistory" class="watch-search-history"></div>
          </label>
          <button id="watchLoadButton" type="button">载入</button>
          <button id="watchPrevButton" type="button" disabled>上一只</button>
          <button id="watchNextButton" type="button" disabled>下一只</button>
          <a class="watch-link-button" href="index.html">返回筛选器</a>
        </div>
        <div class="watch-alerts" id="alertLights" aria-label="预警灯">
          <div class="watch-alert-group">
            <div class="watch-alert-light" data-alert="minuteKdj"><span></span><strong>1分钟 KDJ&gt;80</strong></div>
            <div class="watch-alert-light" data-alert="intradayBlue"><span></span><strong>分时 深蓝</strong></div>
            <div class="watch-alert-light" data-alert="fiveMinuteBoll"><span></span><strong>5分钟 突破BOLL</strong></div>
            <div class="watch-alert-light" data-alert="dayBoll"><span></span><strong>日K 突破BOLL</strong></div>
          </div>
          <div class="watch-alert-group">
            <div class="watch-alert-light is-stop" data-stop-alert="warningPrice"><span></span><strong>预警价格：--</strong></div>
            <div class="watch-alert-light is-stop" data-stop-alert="ma5"><span></span><strong>5日均价：--</strong></div>
            <div class="watch-alert-light is-stop" data-stop-alert="ma10"><span></span><strong>10日均价：--</strong></div>
            <div class="watch-alert-light is-stop" data-stop-alert="ma17"><span></span><strong>17日均价：--</strong></div>
          </div>
        </div>
      </section>

      <section class="watch-audio-bar">
        <button id="enableSoundButton" type="button">启用预警音频</button>
        <label class="watch-upload-audio-button">
          <span>上传音频文件</span>
          <input id="alertAudioInput" type="file" accept="audio/*" multiple />
        </label>
        <select id="alertAudioSelect" aria-label="选择预警音频"></select>
        <button id="deleteAudioButton" type="button">删除音频</button>
        <span id="audioStatus">当前音频：默认提示音</span>
        <button id="watchRefreshButton" class="watch-realtime-button" type="button">实时刷新</button>
      </section>

      <div id="watchBannerModal" class="watch-banner-modal" hidden>
        <div class="watch-banner-dialog" role="dialog" aria-modal="true" aria-labelledby="watchBannerTitle">
          <div class="watch-banner-dialog-head">
            <h2 id="watchBannerTitle">预警横幅内容</h2>
            <button id="watchBannerCloseButton" type="button" aria-label="关闭">×</button>
          </div>
          <textarea id="watchBannerInput" rows="3"></textarea>
          <button id="watchBannerAddButton" type="button">添加内容</button>
          <div id="watchBannerList" class="watch-banner-list"></div>
        </div>
      </div>

      <section class="watch-main-grid">
        <aside class="watch-category-panel">
          <h2>股票分组</h2>
          <div id="watchCategoryList" class="watch-category-list"></div>
        </aside>

        <section class="watch-realtime-panel">
          <div class="watch-section-header">
            <div>
              <div class="watch-title-row">
                <h2 id="watchStockTitle">未选择股票</h2>
                <button id="watchNotesButton" class="watch-notes-button" type="button" aria-label="股票笔记" title="股票笔记">✎</button>
                <div id="watchNotesPreview" class="watch-notes-popover" hidden></div>
              </div>
              <p id="watchStockMeta">--</p>
            </div>
            <div id="watchPriceBadge" class="watch-price-badge">--</div>
          </div>
          <div class="watch-realtime-grid">
            <div class="watch-chart-card watch-intraday-card">
              <h3>分时图</h3>
              <div id="intradayInfo" class="watch-chart-info">--</div>
              <svg id="intradayChart" role="img" aria-label="分时图"></svg>
            </div>
            <div class="watch-order-card">
              <div id="orderBook" class="watch-order-book"></div>
            </div>
          </div>
        </section>
      </section>

      <section class="watch-zoom-bar" aria-label="K线缩放">
        <button id="watchBannerButton" type="button">横幅内容</button>
        <div id="watchAlertBanner" class="watch-alert-banner"><span></span></div>
        <button id="watchZoomInButton" type="button">放大</button>
        <button id="watchZoomOutButton" type="button">缩小</button>
        <button id="watchZoomResetButton" type="button">重置</button>
      </section>
      <section id="periodPanels" class="watch-period-grid" aria-label="周期图"></section>

      <div id="watchNotesModal" class="watch-notes-modal" hidden>
        <div class="watch-notes-dialog" role="dialog" aria-modal="true" aria-labelledby="watchNotesTitle">
          <div class="watch-notes-dialog-head">
            <h2 id="watchNotesTitle">股票笔记</h2>
            <button id="watchNotesCloseButton" type="button" aria-label="关闭">×</button>
          </div>
          <div id="watchNotesEditor" class="watch-notes-columns"></div>
        </div>
      </div>
    </main>

    <script src="assets/listing-dates.js"></script>
    <script src="assets/watch.js?v=20260724-stop-risk-effects"></script>
    <script>
      window.stockWatch.initWatchPage(document);
    </script>
  </body>
</html>
